; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


[env:xc]
platform = espressif32
; board = fishbot_motion_control_four_driver_v2
;另外一个开发板，暂时先用这个做测试
board = esp32-s3-devkitc-1 
framework = arduino
; monitor_filters = esp32_exception_decoder, time
monitor_speed = 115200
board_microros_transport=wifi



; PSRAM配置 - 根据你的板子选择正确的类型
; 方案1: OPI PSRAM (某些ESP32-S3板子)
;board_build.arduino.memory_type = qio_opi
;board_build.flash_mode = qio
;board_build.psram_type = opi

; 方案2: QSPI PSRAM (更常见，如ESP32-S3-WROOM-1)
board_build.arduino.memory_type = qio_qspi
board_build.flash_mode = qio
board_build.psram_type = qspi

; 方案3: 无PSRAM的板子 - 注释掉上面所有PSRAM配置
; 仅使用内部RAM，摄像头会降级到低分辨率



;这样的感觉真的不错

lib_deps =
    ArduinoCore-ESP32@3.0.5
    adafruit/Adafruit GFX Library @ ^1.10.16
    adafruit/Adafruit ST7735 and ST7789 Library @ ^1.10.1
    madhephaestus/ESP32Servo@^0.13.0
    fastled/FastLED @ ^3.6.0  
    adafruit/Adafruit NeoPixel @ ^1.12.0 